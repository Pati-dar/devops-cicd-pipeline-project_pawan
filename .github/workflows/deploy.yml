name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Build Docker Image
      run: docker build -t devops-app .

    - name: Run Container
      run: docker run -d -p 80:5000 devops-app
